<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Power Forecaster</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <!-- Animated background -->
    <div class="bg-scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="wind-lines" id="windLines"></div>
    </div>

    <div class="page-wrapper">

        <!-- Header -->
        <header class="header">
            <div class="badge">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3C9 3 6 5.5 6 9c0 2.6 1.5 4.8 3.8 6H8v2h8v-2h-1.8C16.5 13.8 18 11.6 18 9c0-3.5-3-6-6-6zm0 10.5C9.5 13.5 8 11.4 8 9c0-2.2 1.8-4 4-4s4 1.8 4 4c0 2.4-1.5 4.5-4 4.5z" />
                </svg>
                AI-Powered Forecasting
            </div>
            <h1>Wind Power Forecaster</h1>
            <p class="subtitle">Enter environmental and temporal parameters to get ensemble predictions from our ML models.</p>
        </header>

        <!-- Main Card -->
        <div class="card">
            <form id="predictForm">

                <!-- Section 1: Environmental Conditions -->
                <div class="section-header">
                    <div class="section-icon cyan">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8c2 0 4-2 6-2s4 2 6 2 4-2 6-2M3 14c2 0 4-2 6-2s4 2 6 2 4-2 6-2" />
                        </svg>
                    </div>
                    <span class="section-title">Environmental Conditions</span>
                    <div class="section-line"></div>
                    <!-- Auto-Fill Weather disabled (Requires API Key)
                    <button type="button" class="geolocation-btn" id="geoBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        Auto-Fill Weather
                    </button>
                    -->
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="timestamp">Date/Time</label>
                        <div class="input-wrap">
                            <input type="datetime-local" id="timestamp">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="wind_speed_ms">Wind Speed</label>
                        <div class="input-wrap">
                            <input type="number" id="wind_speed_ms" step="0.1" placeholder="e.g. 5.2">
                            <span class="input-unit">m/s</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="wind_direction">Wind Direction</label>
                        <div class="input-wrap">
                            <input type="number" id="wind_direction" step="1" placeholder="0-360">
                            <span class="input-unit">°</span>
                            <div class="wind-compass-wrap" id="compassWrap">
                                <svg width="24" height="24" viewBox="0 0 24 24">
                                    <path d="M12 2l3 7h-6z" fill="var(--primary)" />
                                    <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Technical Parameters -->
                <div class="section-header">
                    <div class="section-icon purple">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="section-title">Technical Parameters</span>
                    <div class="section-line"></div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="theoretical_power">Theoretical Capacity</label>
                        <div class="input-wrap">
                            <input type="number" id="theoretical_power" step="1" placeholder="Max Power">
                            <span class="input-unit">KW</span>
                            <div class="turbine-wrap">
                                <svg id="turbineIcon" class="turbine-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3" />
                                    <path d="M12 12L12 2" />
                                    <path d="M12 12L4 18" />
                                    <path d="M12 12L20 18" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="btn-wrap">
                    <button type="submit" id="submitBtn">
                        <span class="spinner"></span>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            <path d="M9 12l2 2 4-4" />
                        </svg>
                        Predict Power Output
                    </button>
                </div>
            </form>

            <div id="result">
                <!-- Predictions appear here via JavaScript -->
            </div>
        </div>

        <footer class="footer">
            &copy; 2026 WindVision AI &bull; Ensemble Machine Learning Dashboard
        </footer>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
